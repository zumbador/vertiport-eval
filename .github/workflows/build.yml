name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to upload artifacts to (e.g. v0.1.2)'
        required: false

permissions:
  contents: write

jobs:
  # Creates the GitHub release (or reuses an existing one) before builds start
  # so each platform job can upload directly. Required because dist scripts
  # use `--publish never` to avoid duplicate auto-uploads — without this job
  # `gh release upload` would fail with "release not found" on a fresh tag.
  setup:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || inputs.tag != ''
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="$GITHUB_REF_NAME"
          else
            TAG="${{ inputs.tag }}"
          fi
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG already exists — reusing."
          else
            gh release create "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$TAG" \
              --generate-notes
          fi

  build-linux:
    runs-on: ubuntu-latest
    needs: [setup]
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-node@v4.4.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run dist:linux -- --publish never
      - uses: actions/upload-artifact@v4.6.2
        with:
          name: linux
          path: |
            release/*.deb
            release/*.AppImage
      - name: Resolve release tag
        id: rel
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "tag=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"
          elif [[ -n "${{ inputs.tag }}" ]]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi
      - name: Upload to release
        if: steps.rel.outputs.tag != ''
        run: gh release upload "${{ steps.rel.outputs.tag }}" release/*.deb release/*.AppImage --clobber

  build-windows:
    runs-on: windows-latest
    needs: [setup]
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-node@v4.4.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run dist:win -- --publish never
      - uses: actions/upload-artifact@v4.6.2
        with:
          name: windows
          path: release/*.exe
      - name: Resolve release tag
        id: rel
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "tag=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"
          elif [[ -n "${{ inputs.tag }}" ]]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi
      - name: Upload to release
        if: steps.rel.outputs.tag != ''
        shell: bash
        run: gh release upload "${{ steps.rel.outputs.tag }}" release/*.exe --clobber

  build-mac:
    runs-on: macos-latest
    needs: [setup]
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-node@v4.4.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run dist:mac -- --publish never
      - uses: actions/upload-artifact@v4.6.2
        with:
          name: mac
          path: release/*.dmg
      - name: Resolve release tag
        id: rel
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "tag=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"
          elif [[ -n "${{ inputs.tag }}" ]]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi
      - name: Upload to release
        if: steps.rel.outputs.tag != ''
        run: gh release upload "${{ steps.rel.outputs.tag }}" release/*.dmg --clobber
